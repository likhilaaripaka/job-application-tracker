<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Tracker</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background-color:#f4f6f9;
margin:40px;
}

.container{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 3px 10px rgba(0,0,0,0.1);
}

h2{
color:#333;
}

input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 15px;
margin:5px;
background-color:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background-color:#0056b3;
}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#007bff;
color:white;
}

td,th{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

tr:nth-child(even){
background:#f2f2f2;
}

</style>

</head>

<body>

<div class="container">

<h2>📋 Job Application Tracker</h2>

<div class="form">

<input id="companyName" placeholder="Company Name">
<input id="role" placeholder="Role">
<input id="status" placeholder="Status">
<input id="appliedDate" placeholder="Applied Date">

<button onclick="addJob()">Add Job</button>

</div>

<h3>Job List</h3>

<table id="jobTable">

<tr>
<th>ID</th>
<th>Company</th>
<th>Role</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>
</tr>

</table>

</div>

<script>

function loadJobs(){

fetch("/jobs")
.then(res => res.json())
.then(data =>{

let table = document.getElementById("jobTable");

data.forEach(job => {

let row = table.insertRow();

row.insertCell(0).innerHTML = job.id;
row.insertCell(1).innerHTML = job.companyName;
row.insertCell(2).innerHTML = job.role;
row.insertCell(3).innerHTML = job.status;
row.insertCell(4).innerHTML = job.appliedDate;

let deleteBtn = document.createElement("button");
deleteBtn.innerText = "Delete";

deleteBtn.onclick = function(){

fetch("/jobs/" + job.id,{
method:"DELETE"
}).then(()=>location.reload());

};

row.insertCell(5).appendChild(deleteBtn);

});

});

}

function addJob(){

let job = {

companyName: document.getElementById("companyName").value,
role: document.getElementById("role").value,
status: document.getElementById("status").value,
appliedDate: document.getElementById("appliedDate").value

};

fetch("/jobs",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify(job)

}).then(()=>{

location.reload();

});

}

loadJobs();

</script>

</body>
</html>
